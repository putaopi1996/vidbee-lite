server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;

    # AUTH_BASIC_PLACEHOLDER

    # Gzip compression for text-based assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache Vite hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all client routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy: oRPC API calls
    location /rpc/ {
        proxy_pass http://api:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Reverse proxy: SSE event stream (needs special buffering settings)
    location /events {
        proxy_pass http://api:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Reverse proxy: image proxy
    location /images/ {
        proxy_pass http://api:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
