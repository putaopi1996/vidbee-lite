# VidBee-lite使用说明:
#   1. 将此文件复制到你的服务器目录
#   2. (可选) 修改下面的 VIDBEE_AUTH_USER 和 VIDBEE_AUTH_PASSWORD 开启网页密码
#   3. 执行: docker compose -f docker-compose.deploy.yml up -d

services:
  api:
    image: ghcr.io/putaopi1996/vidbee-lite/api:latest
    environment:
      - VIDBEE_API_HOST=0.0.0.0
      - VIDBEE_API_PORT=3100
      - VIDBEE_DOWNLOAD_DIR=/data/downloads
      - VIDBEE_HISTORY_STORE_PATH=/data/vidbee/vidbee.db
      # 并行下载数限制，低功耗服务器建议设为 1
      - VIDBEE_MAX_CONCURRENT=1
    volumes:
      # 映射下载目录到宿主机，方便取回文件
      - /home/vidbee/downloads:/data/downloads
      # 映射数据库目录
      - vidbee-data:/data/vidbee
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
        # 下载内核资源限制
          cpus: '0.8'
          memory: 800M
    restart: unless-stopped

  web:
    image: ghcr.io/putaopi1996/vidbee-lite/web:latest
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
      # 网页端访问地址
    environment:
      # 网页访问账号密码，留空则不开启验证
      - VIDBEE_AUTH_USER=admin
      - VIDBEE_AUTH_PASSWORD=vidbee_pass
    deploy:
      resources:
        limits:
        # 网页端资源限制
          cpus: '0.2'
          memory: 200M
    restart: unless-stopped

volumes:
  vidbee-data:
